<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — Pulse</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #06060a;
      --glass-border: rgba(255,255,255,0.08);
      --text-primary: #f0f0f5;
      --text-secondary: rgba(240,240,245,0.6);
      --accent-1: #6c5ce7;
      --accent-2: #a29bfe;
      --accent-3: #00cec9;
      --gradient-primary: linear-gradient(135deg, #6c5ce7, #a29bfe, #00cec9);
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .bg-mesh {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none; overflow: hidden;
    }
    .bg-mesh .orb {
      position: absolute; border-radius: 50%; filter: blur(80px);
      animation: orbFloat 20s ease-in-out infinite;
    }
    .bg-mesh .orb:nth-child(1) {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(108,92,231,0.15), transparent 70%);
      top: -200px; left: -100px;
    }
    .bg-mesh .orb:nth-child(2) {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,206,201,0.1), transparent 70%);
      bottom: -150px; right: -100px;
      animation-delay: -7s;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }
    .container {
      position: relative; z-index: 1;
      text-align: center;
      padding: 40px 24px;
      max-width: 560px;
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 700;
      line-height: 1;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    h1 {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    p {
      color: var(--text-secondary);
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 36px;
    }
    .actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px;
      border-radius: 50px; font-weight: 600; font-size: 0.9rem;
      text-decoration: none; cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: none; font-family: var(--font-body);
    }
    .btn-primary {
      background: var(--gradient-primary);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(108,92,231,0.3);
    }
    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--glass-border);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text-primary);
    }
    .links {
      margin-top: 48px;
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.88rem;
      transition: color 0.2s;
    }
    .links a:hover { color: var(--accent-3); }
  </style>
</head>
<body>
  <div class="bg-mesh">
    <div class="orb"></div>
    <div class="orb"></div>
  </div>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Page introuvable</h1>
    <p>La page que vous recherchez n'existe pas ou a peut-être été déplacée. Pas d'inquiétude, vous pouvez revenir sur le site.</p>
    <div class="actions">
      <a href="/" class="btn btn-primary">Retour à l'accueil</a>
      <a href="/blog.html" class="btn btn-ghost">Voir le blog</a>
    </div>
    <div class="links">
      <a href="/pronostic-football-entreprise.html">Pronostic Football</a>
      <a href="/pronostics-coupe-du-monde-2026.html">Coupe du Monde 2026</a>
      <a href="/contact.html">Contact</a>
      <a href="/a-propos.html">À propos</a>
    </div>
  </div>
</body>
</html>
