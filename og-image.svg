<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06060a"/>
      <stop offset="100%" stop-color="#0c0c14"/>
    </linearGradient>
    <linearGradient id="heartG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e84393"/>
      <stop offset="50%" stop-color="#fd79a8"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e84393"/>
      <stop offset="50%" stop-color="#fd79a8"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
    <linearGradient id="orb1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e84393" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="orb2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a29bfe" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative orbs -->
  <circle cx="900" cy="200" r="280" fill="url(#orb1)"/>
  <circle cx="150" cy="500" r="200" fill="url(#orb2)"/>

  <!-- Heart logo large -->
  <g transform="translate(880, 140) scale(5)">
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="url(#heartG)" opacity="0.15"/>
    <path d="M5 12h3l1.5-3 2 6 1.5-4.5 1 1.5H18" fill="none" stroke="url(#heartG)" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
  </g>

  <!-- Heart icon small -->
  <g transform="translate(100, 170) scale(2.2)">
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="url(#heartG)" opacity="0.9"/>
    <path d="M5 12h3l1.5-3 2 6 1.5-4.5 1 1.5H18" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Brand name -->
  <text x="160" y="230" font-family="'Space Grotesk', 'Arial', sans-serif" font-weight="700" font-size="72" fill="#f0f0f5">Pulse</text>

  <!-- Gradient line -->
  <rect x="100" y="260" width="140" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="100" y="310" font-family="'Inter', 'Arial', sans-serif" font-weight="500" font-size="26" fill="url(#accent)">The Employee Engagement Platform</text>

  <!-- Description -->
  <text x="100" y="370" font-family="'Inter', 'Arial', sans-serif" font-weight="400" font-size="22" fill="rgba(240,240,245,0.6)">+50 applications pour engager,</text>
  <text x="100" y="400" font-family="'Inter', 'Arial', sans-serif" font-weight="400" font-size="22" fill="rgba(240,240,245,0.6)">fédérer et connecter vos équipes.</text>

  <!-- Platform badges -->
  <rect x="100" y="450" width="100" height="34" rx="17" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="150" y="472" font-family="'Inter', 'Arial', sans-serif" font-size="13" fill="rgba(240,240,245,0.5)" text-anchor="middle">Teams</text>

  <rect x="212" y="450" width="90" height="34" rx="17" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="257" y="472" font-family="'Inter', 'Arial', sans-serif" font-size="13" fill="rgba(240,240,245,0.5)" text-anchor="middle">Slack</text>

  <rect x="314" y="450" width="120" height="34" rx="17" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="374" y="472" font-family="'Inter', 'Arial', sans-serif" font-size="13" fill="rgba(240,240,245,0.5)" text-anchor="middle">SharePoint</text>

  <rect x="446" y="450" width="80" height="34" rx="17" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="486" y="472" font-family="'Inter', 'Arial', sans-serif" font-size="13" fill="rgba(240,240,245,0.5)" text-anchor="middle">Viva</text>

  <rect x="538" y="450" width="110" height="34" rx="17" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="593" y="472" font-family="'Inter', 'Arial', sans-serif" font-size="13" fill="rgba(240,240,245,0.5)" text-anchor="middle">Staffbase</text>

  <!-- Stats -->
  <text x="100" y="550" font-family="'Space Grotesk', 'Arial', sans-serif" font-weight="600" font-size="22" fill="url(#accent)">50+ apps</text>
  <text x="260" y="550" font-family="'Inter', 'Arial', sans-serif" font-size="16" fill="rgba(240,240,245,0.3)">|</text>
  <text x="285" y="550" font-family="'Space Grotesk', 'Arial', sans-serif" font-weight="600" font-size="22" fill="url(#accent)">100+ entreprises</text>
  <text x="540" y="550" font-family="'Inter', 'Arial', sans-serif" font-size="16" fill="rgba(240,240,245,0.3)">|</text>
  <text x="565" y="550" font-family="'Space Grotesk', 'Arial', sans-serif" font-weight="600" font-size="22" fill="url(#accent)">98% satisfaction</text>

  <!-- URL -->
  <text x="100" y="600" font-family="'Inter', 'Arial', sans-serif" font-weight="400" font-size="16" fill="rgba(240,240,245,0.35)">pulsework.app</text>
</svg>
